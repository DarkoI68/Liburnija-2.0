<html lang="hr" data-theme="light">
<head>
<meta charset="utf-8">
<title>Liburnija — Platforma · Kompletna struktura</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
html[data-theme="dark"]{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2330;--bgh:#212936;--bdr:#2d3748;--tp:#f0f4f8;--ts:#8b95a1;--tm:#4b5563;--acc:#f97316;--accs:rgba(249,115,22,.12);--blu:#3b82f6;--grn:#22c55e;--red:#ef4444;--pur:#a855f7;--yel:#eab308}
html[data-theme="light"]{--bg:#f0f4f8;--bg2:#fff;--bg3:#f8fafc;--bgh:#f1f5f9;--bdr:#e2e8f0;--tp:#0f172a;--ts:#64748b;--tm:#94a3b8;--acc:#f97316;--accs:rgba(249,115,22,.09);--blu:#3b82f6;--grn:#16a34a;--red:#dc2626;--pur:#9333ea;--yel:#ca8a04}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--tp);display:flex;height:100vh;font-size:13px;overflow:hidden}

.sb{width:248px;background:var(--bg2);border-right:1px solid var(--bdr);display:flex;flex-direction:column;padding:14px 10px;flex-shrink:0;height:100vh}
.sb-logo{display:flex;align-items:center;gap:9px;padding:6px 6px 13px;border-bottom:1px solid var(--bdr);margin-bottom:6px}
.sb-icon{width:32px;height:32px;border-radius:7px;border:1.5px solid var(--acc);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(249,115,22,.1)}
.sb-nm{font-size:13.5px;font-weight:700}
.sb-sub{font-size:10px;color:var(--ts);text-transform:uppercase;letter-spacing:.5px}
.sb-scroll{flex:1;overflow-y:auto;min-height:0;margin:0 -4px;padding:2px 4px;scrollbar-gutter:stable}
.glbl{font-size:9px;color:var(--tm);text-transform:uppercase;font-weight:700;letter-spacing:.8px;padding:11px 6px 5px}
.m{margin-bottom:1px}
.m-h{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:7px;cursor:pointer;font-size:12.5px;font-weight:600;color:var(--tp);transition:background .12s}
.m-h:hover{background:var(--bgh)}
.m-h.on{background:rgba(249,115,22,.1);color:var(--acc)}
.m-h svg.ic{width:15px;height:15px;stroke:currentColor;stroke-width:1.8;fill:none;flex-shrink:0}
.m-h .chev{margin-left:auto;width:12px;height:12px;stroke:currentColor;stroke-width:2.2;fill:none;transition:transform .15s;opacity:.6}
.m.open .m-h .chev{transform:rotate(90deg)}
.m-body{display:none;padding:2px 0 6px}
.m.open .m-body{display:block}
.pg{display:flex;align-items:center;gap:7px;padding:5px 8px 5px 30px;border-radius:6px;cursor:pointer;font-size:11.5px;font-weight:500;color:var(--ts);transition:all .1s;margin-bottom:1px}
.pg:hover{background:var(--bgh);color:var(--tp)}
.pg.on{background:rgba(249,115,22,.09);color:var(--acc);font-weight:600}
.pg.dash{color:var(--tp);font-weight:600}
.pg .own{margin-left:auto;font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:.2px;padding:1px 4px;border-radius:3px;background:rgba(100,116,139,.14);color:var(--tm);flex-shrink:0}
.pg.on .own{background:var(--accs);color:var(--acc)}
.pg .own.live{background:rgba(34,197,94,.16);color:var(--grn)}
/* nested sekcije (Promet) */
.sec{margin:2px 0 2px 18px}
.sec-h{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;cursor:pointer;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--ts)}
.sec-h:hover{background:var(--bgh);color:var(--tp)}
.sec-h .chev{margin-left:auto;width:11px;height:11px;stroke:currentColor;stroke-width:2.4;fill:none;transition:transform .15s}
.sec.open .sec-h .chev{transform:rotate(90deg)}
.sec-body{display:none}.sec.open .sec-body{display:block}
.sec .pg{padding-left:24px;font-size:11px}

.sb-foot{margin-top:8px;border-top:1px solid var(--bdr);padding-top:10px;flex-shrink:0}
.sb-settings{display:flex;gap:5px;margin-bottom:8px}
.sb-settings button{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:7px 6px;border:1px solid var(--bdr);background:var(--bg3);border-radius:7px;color:var(--ts);font-family:inherit;font-size:10.5px;font-weight:500;cursor:pointer}
.sb-settings button:hover{border-color:var(--acc);color:var(--acc)}
.sb-settings button svg{width:12px;height:12px;stroke:currentColor;stroke-width:1.8;fill:none}
.ucard{display:flex;align-items:center;gap:9px;padding:7px;background:var(--bg3);border-radius:8px;border:1px solid var(--bdr)}
.uavt{width:30px;height:30px;border-radius:50%;background:var(--acc);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}

.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:11px 18px;background:var(--bg2);border-bottom:1px solid var(--bdr);gap:14px;flex-shrink:0}
.crumb{font-size:11px;color:var(--ts);font-weight:600;margin-bottom:2px}.crumb b{color:var(--acc)}
.topbar-title{font-size:15.5px;font-weight:700}
.tcount{font-size:11px;color:var(--ts);font-weight:600;background:var(--bg3);border:1px solid var(--bdr);padding:5px 11px;border-radius:7px}
.content{flex:1;padding:15px 18px;overflow-y:auto;background:var(--bg);min-height:0}

.strip{display:grid;background:var(--bg2);border:1px solid var(--bdr);border-radius:11px;overflow:hidden;margin-bottom:13px}
.st{padding:12px 15px;border-right:1px solid var(--bdr)}.st:last-child{border-right:none}
.st-n{font-size:21px;font-weight:700;line-height:1;font-feature-settings:"tnum" 1;display:flex;align-items:center;gap:7px}
.st-n .d{width:8px;height:8px;border-radius:50%;background:var(--tm)}
.st-n .d.r{background:var(--red)}.st-n .d.y{background:var(--yel)}.st-n .d.g{background:var(--grn)}.st-n .d.b{background:var(--blu)}
.st-l{font-size:10px;color:var(--ts);font-weight:600;margin-top:5px}

.grid{display:grid;grid-template-columns:1.5fr 1fr;gap:12px;align-items:start}
@media(max-width:1050px){.grid{grid-template-columns:1fr}}
.panel{background:var(--bg2);border:1px solid var(--bdr);border-radius:11px;overflow:hidden}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--bdr)}
.panel-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px}
.panel-title svg{width:14px;height:14px;stroke:var(--acc);stroke-width:2;fill:none}
.panel-cnt{font-size:11px;color:var(--ts);font-weight:600;background:var(--bg3);padding:2px 8px;border-radius:5px;border:1px solid var(--bdr)}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:12px}
.pgc{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;font-size:11.5px;font-weight:600;cursor:pointer;transition:all .1s}
.pgc:hover{border-color:var(--acc);transform:translateY(-1px)}
.pgc .dot{width:6px;height:6px;border-radius:50%;background:var(--tm);flex-shrink:0}
.pgc .dot.live{background:var(--grn)}
.pgc .t{margin-left:auto;font-size:8px;font-weight:700;text-transform:uppercase;color:var(--ts)}
.pgc .t.live{color:var(--grn)}
.al{display:flex;align-items:center;gap:9px;padding:9px 14px;border-bottom:1px solid var(--bdr);font-size:12px}.al:last-child{border-bottom:none}
.al .ad{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.al.r .ad{background:var(--red)}.al.y .ad{background:var(--yel)}.al.b .ad{background:var(--blu)}.al.g .ad{background:var(--grn)}
.al .am{flex:1;font-weight:600}.al .an{font-weight:700;font-feature-settings:"tnum" 1}
.al.r .an{color:var(--red)}.al.y .an{color:var(--yel)}.al.g .an{color:var(--grn)}.al.b .an{color:var(--blu)}

.map{height:300px;position:relative;background:var(--bg3)}
.map svg{position:absolute;inset:0;width:100%;height:100%}
.veh{position:absolute;width:11px;height:11px;border-radius:50%;border:2px solid var(--bg2);transform:translate(-50%,-50%)}
.veh.g{background:var(--grn)}.veh.y{background:var(--yel)}.veh.r{background:var(--red)}
.veh.live{animation:pulse 1.8s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(249,115,22,.45)}70%{box-shadow:0 0 0 9px rgba(249,115,22,0)}100%{box-shadow:0 0 0 0 rgba(249,115,22,0)}}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--ts);font-weight:700;padding:9px 14px;border-bottom:1px solid var(--bdr);background:var(--bg3)}
.tbl td{padding:9px 14px;border-bottom:1px solid var(--bdr);font-weight:500}.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bgh)}.tbl .num{font-feature-settings:"tnum" 1;font-weight:600}.tbl .ln{font-weight:700}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600}.pill .pd{width:7px;height:7px;border-radius:50%}
.pill.g .pd{background:var(--grn)}.pill.y .pd{background:var(--yel)}.pill.r .pd{background:var(--red)}.pill.b .pd{background:var(--blu)}
.mt12{margin-top:12px}
.ph{background:var(--bg2);border:1px solid var(--bdr);border-radius:11px;padding:32px;text-align:center;color:var(--ts)}
.ph svg{width:28px;height:28px;stroke:var(--tm);stroke-width:1.6;fill:none;margin-bottom:9px}
.ph h3{font-size:15px;color:var(--tp);font-weight:700;margin-bottom:5px}.ph p{font-size:12px;max-width:420px;margin:0 auto;line-height:1.5}
.ph .open-btn{display:inline-flex;align-items:center;gap:7px;margin-top:14px;padding:9px 16px;background:var(--acc);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer}
.note{margin-top:12px;font-size:11px;color:var(--ts);background:var(--bg2);border:1px dashed var(--bdr);border-radius:9px;padding:10px 13px;line-height:1.5}.note b{color:var(--tp)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--tp);color:var(--bg2);padding:9px 16px;border-radius:8px;font-size:12px;font-weight:600;opacity:0;transition:all .25s;pointer-events:none;z-index:99}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
