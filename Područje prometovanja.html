<!DOCTYPE html>
<html lang="hr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liburnija — Područja prometovanja</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
html[data-theme="dark"]{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2330;--bgh:#212936;--bdr:#2d3748;--tp:#f0f4f8;--ts:#8b95a1;--tm:#4b5563;--acc:#f97316;--accs:rgba(249,115,22,.14);--blu:#3b82f6;--blus:rgba(59,130,246,.16);--grn:#22c55e;--grns:rgba(34,197,94,.16);--tea:#14b8a6;--teas:rgba(20,184,166,.16);--red:#ef4444;--reds:rgba(239,68,68,.14)}
html[data-theme="light"]{--bg:#f0f4f8;--bg2:#fff;--bg3:#f8fafc;--bgh:#f1f5f9;--bdr:#e2e8f0;--tp:#0f172a;--ts:#64748b;--tm:#94a3b8;--acc:#f97316;--accs:rgba(249,115,22,.1);--blu:#3b82f6;--blus:rgba(59,130,246,.11);--grn:#16a34a;--grns:rgba(22,163,74,.11);--tea:#0d9488;--teas:rgba(13,148,136,.11);--red:#dc2626;--reds:rgba(220,38,38,.09)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--tp);height:100vh;display:flex;flex-direction:column;font-size:13px;overflow:hidden}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:5px}::-webkit-scrollbar-track{background:transparent}

.top{display:flex;align-items:center;gap:12px;padding:11px 18px;background:var(--bg2);border-bottom:1.5px solid var(--bdr);flex-shrink:0}
.brand{display:flex;align-items:center;gap:9px}
.brand-ic{width:30px;height:30px;border-radius:8px;background:var(--accs);display:flex;align-items:center;justify-content:center}
.brand-ic svg{width:17px;height:17px;stroke:var(--acc);stroke-width:2.2;fill:none}
.brand-tit{font-size:14px;font-weight:800;letter-spacing:.2px}
.brand-sub{font-size:10px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.6px}
.crumb{font-size:11px;color:var(--ts);font-weight:600;margin-left:6px}.crumb b{color:var(--acc)}
.top-sp{flex:1}
.tbtn{display:flex;align-items:center;justify-content:center;width:34px;height:34px;background:var(--bg3);border:1.5px solid var(--bdr);border-radius:8px;color:var(--ts)}
.tbtn:hover{border-color:var(--acc);color:var(--acc)}.tbtn svg{width:17px;height:17px;stroke:currentColor;stroke-width:2;fill:none}

.wrap{flex:1;overflow-y:auto;min-height:0}
.inner{max-width:960px;margin:0 auto;padding:20px 24px 60px}
.hd{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.hd h1{font-size:22px;font-weight:800;letter-spacing:.2px}
.hd .eyebrow{font-size:10px;font-weight:800;color:var(--ts);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:8px;font-size:12px;font-weight:700;padding:8px 13px;transition:all .12s}
.btn svg{width:14px;height:14px;stroke:currentColor;stroke-width:2.4;fill:none}
.btn-acc{background:var(--acc);color:#fff}.btn-acc:hover{filter:brightness(1.06)}
.btn-ghost{background:var(--bg2);border:1.5px solid var(--bdr);color:var(--ts)}.btn-ghost:hover{border-color:var(--acc);color:var(--acc)}
.btn-danger{background:transparent;border:1.5px solid var(--bdr);color:var(--red)}.btn-danger:hover{background:var(--red);border-color:var(--red);color:#fff}
.btn-danger:disabled{opacity:.45;cursor:not-allowed}.btn-danger:disabled:hover{background:transparent;border-color:var(--bdr);color:var(--red)}

.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.kpi{background:var(--bg2);border:1.5px solid var(--bdr);border-radius:11px;padding:12px 14px}
.kpi-n{font-size:21px;font-weight:800;font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:7px;line-height:1}
.kpi-n .d{width:8px;height:8px;border-radius:50%;background:var(--grn)}
.kpi-l{font-size:10px;color:var(--ts);font-weight:600;margin-top:6px;text-transform:uppercase;letter-spacing:.3px}

.tblwrap{background:var(--bg2);border:1.5px solid var(--bdr);border-radius:13px;overflow:hidden}
table.pp{width:100%;border-collapse:collapse;font-size:13px}
table.pp th{font-size:9.5px;font-weight:800;color:var(--ts);text-transform:uppercase;letter-spacing:.4px;text-align:left;padding:11px 14px;border-bottom:1.5px solid var(--bdr);background:var(--bg3);white-space:nowrap}
table.pp td{padding:10px 14px;border-bottom:1px solid var(--bdr);vertical-align:middle}
table.pp tr:last-child td{border-bottom:none}
table.pp tbody tr{cursor:pointer;transition:background .1s}
table.pp tbody tr:hover{background:var(--bgh)}
.ord{display:flex;align-items:center;gap:8px}
.ord-n{font-family:"DM Mono",monospace;font-weight:600;font-size:12px;color:var(--ts);width:14px;text-align:center}
.ord-btns{display:flex;flex-direction:column;gap:1px}
.ordb{width:20px;height:15px;border:1px solid var(--bdr);background:var(--bg3);border-radius:4px;color:var(--ts);display:flex;align-items:center;justify-content:center;padding:0}
.ordb:hover:not(:disabled){border-color:var(--acc);color:var(--acc)}
.ordb:disabled{opacity:.3;cursor:default}
.ordb svg{width:10px;height:10px;stroke:currentColor;stroke-width:2.6;fill:none}
.pp-nm{font-weight:700;font-size:13.5px}
.sif{font-family:"DM Mono",monospace;font-weight:600;font-size:11.5px;background:var(--bg3);border:1px solid var(--bdr);border-radius:6px;padding:2px 8px;letter-spacing:.5px}
.pill{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;padding:3px 9px;border-radius:20px;display:inline-block;white-space:nowrap}
.skg-Gradski{background:var(--accs);color:var(--acc)}
.skg-Prigradski{background:var(--blus);color:var(--blu)}
.skg-Otočni{background:var(--teas);color:var(--tea)}
.st-aktivno{background:var(--grns);color:var(--grn)}
.st-neaktivno{background:var(--bg3);color:var(--tm);border:1px solid var(--bdr)}
.lin-c{font-family:"DM Mono",monospace;font-weight:600;font-variant-numeric:tabular-nums}
.lin-c .z{color:var(--tm)}
.hint{font-size:11.5px;color:var(--ts);font-weight:500;margin-top:11px;display:flex;align-items:center;gap:7px}
.hint svg{width:14px;height:14px;stroke:var(--ts);stroke-width:2;fill:none;flex-shrink:0}

.mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-start;justify-content:center;z-index:200;padding:40px 20px;overflow-y:auto}
.mbg.on{display:flex}
.card{background:var(--bg2);border:1.5px solid var(--bdr);border-radius:15px;width:100%;max-width:460px;box-shadow:0 24px 70px rgba(0,0,0,.32);overflow:hidden}
.card-hd{display:flex;align-items:center;justify-content:space-between;padding:17px 20px;border-bottom:1.5px solid var(--bdr);background:var(--bg3)}
.card-hd h3{font-size:15.5px;font-weight:800}
.card-x{width:30px;height:30px;border:none;background:transparent;border-radius:7px;color:var(--ts);display:flex;align-items:center;justify-content:center}
.card-x:hover{background:var(--bgh);color:var(--tp)}.card-x svg{width:17px;height:17px;stroke:currentColor;stroke-width:2;fill:none}
.card-bd{padding:18px 20px}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:9.5px;font-weight:800;color:var(--ts);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.fld input,.fld select{width:100%;font-family:inherit;font-size:13.5px;font-weight:600;color:var(--tp);background:var(--bg3);border:1.5px solid var(--bdr);border-radius:8px;padding:9px 12px}
.fld input.mono{font-family:"DM Mono",monospace;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.fld input:focus,.fld select:focus{outline:none;border-color:var(--acc);background:var(--bg2)}
.fld-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.ro-info{background:var(--bg3);border:1.5px solid var(--bdr);border-radius:9px;padding:10px 13px;font-size:12px;color:var(--ts);font-weight:600;margin-bottom:4px}
.ro-info b{color:var(--tp);font-weight:800;font-variant-numeric:tabular-nums}
.card-ft{display:flex;align-items:center;gap:9px;padding:14px 20px;border-top:1.5px solid var(--bdr);background:var(--bg3)}
.card-ft .sp{flex:1}
@media(max-width:620px){.kpis{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div class="top">
  <div class="brand">
    <div class="brand-ic"><svg viewBox="0 0 24 24"><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg></div>
    <div><div class="brand-tit">Liburnija</div><div class="brand-sub">Područja prometovanja</div></div>
  </div>
  <div class="crumb"><b>CORE</b> › Područja prometovanja</div>
  <div class="top-sp"></div>
  <button class="tbtn" id="themeBtn" title="Tema" onclick="toggleTheme()"><svg id="themeIc" viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg></button>
</div>

<div class="wrap"><div class="inner">
  <div class="hd">
    <div><div class="eyebrow">Šifrarnik</div><h1>Područja prometovanja</h1></div>
    <button class="btn btn-acc" onclick="openP(null)"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Novo područje</button>
  </div>
  <div class="kpis" id="KPIS"></div>
  <div class="tblwrap"><table class="pp">
    <thead><tr><th style="width:90px">Redoslijed</th><th>Naziv</th><th>Šifra</th><th>Skupina</th><th class="num" style="text-align:left">Linija</th><th>Status</th></tr></thead>
    <tbody id="TBODY"></tbody>
  </table></div>
  <div class="hint"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4M12 8h.01"/></svg>Redoslijed određuje poredak grupiranja u registru Linija. Područje s vezanim linijama ne može se obrisati.</div>
</div></div>

<div class="mbg" id="cardBg"><div class="card" id="cardEl"></div></div>

<script>
const SKUPINE=["Gradski","Prigradski","Otočni"];
const esc=s=>(s==null?'':(''+s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// CORE šifrarnik — područja (brLinija = izračunato iz registra Linija)
let PODRUCJA=[
  {id:"grad",   naziv:"Grad",        sifra:"GRA", skupina:"Gradski",   status:"aktivno", brLinija:13, red:1},
  {id:"prigrad",naziv:"Prigrad",     sifra:"PRI", skupina:"Prigradski",status:"aktivno", brLinija:16, red:2},
  {id:"ugljan", naziv:"Otok Ugljan", sifra:"UGL", skupina:"Otočni",    status:"aktivno", brLinija:6,  red:3},
  {id:"dugi",   naziv:"Dugi otok",   sifra:"DUG", skupina:"Otočni",    status:"aktivno", brLinija:6,  red:4},
  {id:"iz",     naziv:"Otok Iž",     sifra:"IZ",  skupina:"Otočni",    status:"aktivno", brLinija:3,  red:5}
];
let editId=null;

function sorted(){ return PODRUCJA.slice().sort((a,b)=>a.red-b.red); }

function render(){
  renderKpis();
  const rows=sorted();
  document.getElementById('TBODY').innerHTML=rows.map(function(p,i){
    const up = i>0, dn = i<rows.length-1;
    return '<tr onclick="openP(\''+p.id+'\')">'
      +'<td><div class="ord"><span class="ord-n">'+(i+1)+'</span><div class="ord-btns">'
        +'<button class="ordb" '+(up?'':'disabled')+' onclick="move(event,\''+p.id+'\',-1)"><svg viewBox="0 0 24 24"><path d="M18 15l-6-6-6 6"/></svg></button>'
        +'<button class="ordb" '+(dn?'':'disabled')+' onclick="move(event,\''+p.id+'\',1)"><svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></button>'
      +'</div></div></td>'
      +'<td><span class="pp-nm">'+esc(p.naziv)+'</span></td>'
      +'<td><span class="sif">'+esc(p.sifra)+'</span></td>'
      +'<td><span class="pill skg-'+p.skupina+'">'+p.skupina+'</span></td>'
      +'<td><span class="lin-c'+(p.brLinija?'':' ')+'">'+(p.brLinija?p.brLinija:'<span class="z">0</span>')+'</span></td>'
      +'<td><span class="pill st-'+p.status+'">'+(p.status==='aktivno'?'Aktivno':'Neaktivno')+'</span></td>'
      +'</tr>';
  }).join('');
}
function renderKpis(){
  const tot=PODRUCJA.length, akt=PODRUCJA.filter(p=>p.status==='aktivno').length;
  const lin=PODRUCJA.reduce((s,p)=>s+(p.brLinija||0),0);
  const sk=new Set(PODRUCJA.map(p=>p.skupina)).size;
  const k=[[tot,'Područja',false],[akt,'Aktivnih',true],[lin,'Ukupno linija',false],[sk,'Skupina',false]];
  document.getElementById('KPIS').innerHTML=k.map(s=>'<div class="kpi"><div class="kpi-n">'+(s[2]?'<span class="d"></span>':'')+s[0]+'</div><div class="kpi-l">'+s[1]+'</div></div>').join('');
}
function move(e,id,dir){
  e.stopPropagation();
  const rows=sorted(); const i=rows.findIndex(p=>p.id===id); const j=i+dir;
  if(j<0||j>=rows.length) return;
  const a=rows[i], b=rows[j]; const tmp=a.red; a.red=b.red; b.red=tmp;
  render();
}
function toggleTheme(){ const h=document.documentElement,dk=h.getAttribute('data-theme')==='dark'; h.setAttribute('data-theme',dk?'light':'dark');
  document.getElementById('themeIc').innerHTML=dk?'<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>':'<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M6.3 17.7l-1.4 1.4M19.1 4.9l-1.4 1.4"/>'; }

/* ─── Uređivanje ─── */
function openP(id){
  editId=id;
  const p = id ? PODRUCJA.find(x=>x.id===id) : { naziv:'', sifra:'', skupina:'Gradski', status:'aktivno', brLinija:0 };
  const isNew=!id;
  let h='<div class="card-hd"><h3>'+(isNew?'Novo područje':'Uredi područje')+'</h3>'
   +'<button class="card-x" onclick="closeCard()"><svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>';
  h+='<div class="card-bd">';
  h+='<div class="fld"><label>Naziv</label><input id="f_naziv" value="'+esc(p.naziv)+'" placeholder="npr. Otok Pašman"></div>';
  h+='<div class="fld-row"><div class="fld"><label>Šifra</label><input id="f_sifra" class="mono" maxlength="6" value="'+esc(p.sifra)+'" placeholder="PAS"></div>'
   +'<div class="fld"><label>Skupina</label><select id="f_skupina">'+SKUPINE.map(s=>'<option'+(p.skupina===s?' selected':'')+'>'+s+'</option>').join('')+'</select></div></div>';
  h+='<div class="fld"><label>Status</label><select id="f_status"><option value="aktivno"'+(p.status==='aktivno'?' selected':'')+'>Aktivno</option><option value="neaktivno"'+(p.status==='neaktivno'?' selected':'')+'>Neaktivno</option></select></div>';
  if(!isNew){ h+='<div class="ro-info">Vezanih linija: <b>'+(p.brLinija||0)+'</b> · izračunato iz registra Linija</div>'; }
  h+='</div>';
  const canDel = !isNew && (p.brLinija||0)===0;
  h+='<div class="card-ft">';
  if(!isNew){ h+='<button class="btn btn-danger" '+(canDel?'':'disabled title="Postoje vezane linije"')+' onclick="deleteP(\''+p.id+'\')">Obriši</button>'; }
  h+='<div class="sp"></div><button class="btn btn-ghost" onclick="closeCard()">Odustani</button>'
   +'<button class="btn btn-acc" onclick="saveP()">'+(isNew?'Kreiraj':'Spremi')+'</button></div>';
  document.getElementById('cardEl').innerHTML=h;
  document.getElementById('cardBg').classList.add('on');
  setTimeout(()=>{ const n=document.getElementById('f_naziv'); if(isNew&&n) n.focus(); },40);
}
function closeCard(){ document.getElementById('cardBg').classList.remove('on'); editId=null; }
function val(k){ const e=document.getElementById('f_'+k); return e?e.value.trim():''; }
function saveP(){
  const naziv=val('naziv'); if(!naziv){ document.getElementById('f_naziv').focus(); return; }
  const sifra=val('sifra').toUpperCase();
  let p = editId ? PODRUCJA.find(x=>x.id===editId) : null;
  if(!p){ p={ id:'p'+Date.now(), brLinija:0, red:(Math.max(0,...PODRUCJA.map(x=>x.red))+1) }; PODRUCJA.push(p); }
  p.naziv=naziv; p.sifra=sifra; p.skupina=val('skupina'); p.status=val('status');
  closeCard(); render();
}
function deleteP(id){
  const p=PODRUCJA.find(x=>x.id===id); if(!p) return;
  if((p.brLinija||0)>0){ alert('Nije moguće obrisati „'+p.naziv+'" — postoji '+p.brLinija+' vezanih linija. Prvo prerasporedite ili uklonite linije.'); return; }
  if(!confirm('Obrisati područje „'+p.naziv+'"?')) return;
  PODRUCJA=PODRUCJA.filter(x=>x.id!==id); closeCard(); render();
}

document.getElementById('cardBg').addEventListener('click',function(e){ if(e.target===this) closeCard(); });
render();
</script>
</body>
</html>
