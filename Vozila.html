<!DOCTYPE html>
<html lang="hr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liburnija — Vozila</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
html[data-theme="dark"]{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2330;--bgh:#212936;--bdr:#2d3748;--tp:#f0f4f8;--ts:#8b95a1;--tm:#4b5563;--acc:#f97316;--accs:rgba(249,115,22,.14);--blu:#3b82f6;--grn:#22c55e;--red:#ef4444;--grns:rgba(34,197,94,.15);--reds:rgba(239,68,68,.14);--yel:#eab308;--yels:rgba(234,179,8,.15)}
html[data-theme="light"]{--bg:#f0f4f8;--bg2:#fff;--bg3:#f8fafc;--bgh:#f1f5f9;--bdr:#e2e8f0;--tp:#0f172a;--ts:#64748b;--tm:#94a3b8;--acc:#f97316;--accs:rgba(249,115,22,.09);--blu:#3b82f6;--grn:#16a34a;--red:#dc2626;--grns:rgba(22,163,74,.1);--reds:rgba(220,38,38,.09);--yel:#ca8a04;--yels:rgba(202,138,4,.12)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--tp);height:100vh;display:flex;flex-direction:column;font-size:13px;overflow:hidden}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:5px}::-webkit-scrollbar-track{background:transparent}

.top{display:flex;align-items:center;gap:12px;padding:11px 18px;background:var(--bg2);border-bottom:1.5px solid var(--bdr);flex-shrink:0}
.brand{display:flex;align-items:center;gap:9px}
.brand-ic{width:30px;height:30px;border-radius:8px;background:var(--accs);display:flex;align-items:center;justify-content:center}
.brand-ic svg{width:17px;height:17px;stroke:var(--acc);stroke-width:2.2;fill:none}
.brand-tit{font-size:14px;font-weight:800;letter-spacing:.2px}
.brand-sub{font-size:10px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.6px}
.crumb{font-size:11px;color:var(--ts);font-weight:600;margin-left:6px}.crumb b{color:var(--acc)}
.top-sp{flex:1}
.tbtn{display:flex;align-items:center;justify-content:center;width:34px;height:34px;background:var(--bg3);border:1.5px solid var(--bdr);border-radius:8px;color:var(--ts)}
.tbtn:hover{border-color:var(--acc);color:var(--acc)}
.tbtn svg{width:17px;height:17px;stroke:currentColor;stroke-width:2;fill:none}

.wrap{flex:1;overflow-y:auto;min-height:0}
.inner{max-width:1320px;margin:0 auto;padding:20px 24px 60px}
.hd{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.hd h1{font-size:22px;font-weight:800;letter-spacing:.2px}
.hd .eyebrow{font-size:10px;font-weight:800;color:var(--ts);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.hd-act{display:flex;gap:9px}
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:8px;font-size:12px;font-weight:700;padding:8px 13px;transition:all .12s}
.btn svg{width:14px;height:14px;stroke:currentColor;stroke-width:2.4;fill:none}
.btn-acc{background:var(--acc);color:#fff}.btn-acc:hover{filter:brightness(1.06)}
.btn-ghost{background:var(--bg2);border:1.5px solid var(--bdr);color:var(--ts)}.btn-ghost:hover{border-color:var(--acc);color:var(--acc)}
.btn-danger{background:transparent;border:1.5px solid var(--bdr);color:var(--red)}.btn-danger:hover{background:var(--red);border-color:var(--red);color:#fff}

.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:16px}
.kpi{background:var(--bg2);border:1.5px solid var(--bdr);border-radius:11px;padding:12px 14px}
.kpi-n{font-size:21px;font-weight:800;font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:7px;line-height:1}
.kpi-n .d{width:8px;height:8px;border-radius:50%;background:var(--tm)}.kpi-n .d.g{background:var(--grn)}.kpi-n .d.r{background:var(--red)}.kpi-n .d.b{background:var(--blu)}.kpi-n .d.y{background:var(--yel)}
.kpi-l{font-size:10px;color:var(--ts);font-weight:600;margin-top:6px;text-transform:uppercase;letter-spacing:.3px}

.toolbar{display:flex;align-items:center;gap:9px;margin-bottom:13px;flex-wrap:wrap}
.search{position:relative;display:flex;align-items:center;background:var(--bg2);border:1.5px solid var(--bdr);border-radius:9px;padding:0 11px;height:38px;flex:1;min-width:220px}
.search:focus-within{border-color:var(--acc)}
.search svg{width:15px;height:15px;stroke:var(--ts);stroke-width:2;fill:none;flex-shrink:0;margin-right:8px}
.search input{flex:1;background:transparent;border:0;outline:0;font-family:inherit;font-size:13px;font-weight:500;color:var(--tp)}
.fchips{display:flex;gap:6px;flex-wrap:wrap}
.fchip{padding:8px 13px;background:var(--bg2);border:1.5px solid var(--bdr);border-radius:9px;font-size:11.5px;font-weight:700;color:var(--ts);transition:all .12s}
.fchip:hover{border-color:var(--acc);color:var(--tp)}
.fchip.on{background:var(--accs);border-color:var(--acc);color:var(--acc)}
.fsel{height:38px;font-family:inherit;font-size:12px;font-weight:700;color:var(--tp);background:var(--bg2);border:1.5px solid var(--bdr);border-radius:9px;padding:0 10px}
.fsel:focus{outline:none;border-color:var(--acc)}

.tblwrap{background:var(--bg2);border:1.5px solid var(--bdr);border-radius:13px;overflow:hidden}
table.fleet{width:100%;border-collapse:collapse;font-size:12.5px}
table.fleet th{font-size:9.5px;font-weight:800;color:var(--ts);text-transform:uppercase;letter-spacing:.4px;text-align:left;padding:11px 12px;border-bottom:1.5px solid var(--bdr);white-space:nowrap;cursor:pointer;user-select:none;background:var(--bg3)}
table.fleet th:hover{color:var(--acc)}
table.fleet th .ar{opacity:.5;font-size:9px}
table.fleet td{padding:9px 12px;border-bottom:1px solid var(--bdr);vertical-align:middle;white-space:nowrap}
table.fleet tr:last-child td{border-bottom:none}
table.fleet tbody tr{cursor:pointer;transition:background .1s}
table.fleet tbody tr:hover{background:var(--bgh)}
.gbr{font-family:"DM Mono",monospace;font-weight:600;font-size:12.5px;background:var(--bg3);border:1px solid var(--bdr);border-radius:6px;padding:2px 8px;display:inline-block;font-variant-numeric:tabular-nums}
.reg{font-family:"DM Mono",monospace;font-weight:500;letter-spacing:.3px}
.mk{font-weight:700}.md{color:var(--ts);font-weight:500}
.num{text-align:center;font-variant-numeric:tabular-nums}
.euro{font-size:10px;font-weight:800;letter-spacing:.3px;padding:2px 7px;border-radius:5px;background:var(--bg3);border:1px solid var(--bdr);color:var(--ts)}
.euro.e6{background:var(--grns);color:var(--grn);border-color:transparent}
.pill{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;padding:3px 9px;border-radius:20px;display:inline-block}
.pill.aktivno{background:var(--grns);color:var(--grn)}
.pill.odjavljeno{background:var(--bg3);color:var(--ts);border:1px solid var(--bdr)}
.pill.rashod{background:var(--reds);color:var(--red)}
.dexp{font-family:"DM Mono",monospace;font-size:11.5px}.dexp.soon{color:var(--yel);font-weight:600}.dexp.over{color:var(--red);font-weight:600}.dexp.none{color:var(--tm)}
.empty-tbl{padding:40px;text-align:center;color:var(--ts);font-weight:600}

/* Card modal */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-start;justify-content:center;z-index:200;padding:32px 20px;overflow-y:auto}
.mbg.on{display:flex}
.card{background:var(--bg2);border:1.5px solid var(--bdr);border-radius:15px;width:100%;max-width:760px;box-shadow:0 24px 70px rgba(0,0,0,.32);overflow:hidden}
.card-hd{display:flex;align-items:flex-start;gap:14px;padding:18px 22px;border-bottom:1.5px solid var(--bdr);background:var(--bg3)}
.card-hd .gbr{font-size:14px;padding:4px 11px}
.card-hd-main{flex:1;min-width:0}
.card-hd-tit{font-size:18px;font-weight:800;margin-top:7px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.card-hd-sub{font-size:11.5px;color:var(--ts);font-weight:600;margin-top:3px}
.card-x{width:30px;height:30px;border:none;background:transparent;border-radius:7px;color:var(--ts);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-x:hover{background:var(--bgh);color:var(--tp)}.card-x svg{width:17px;height:17px;stroke:currentColor;stroke-width:2;fill:none}
.card-bd{padding:18px 22px}
.sect-t{font-size:10px;font-weight:800;color:var(--ts);text-transform:uppercase;letter-spacing:.6px;margin:4px 0 11px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:13px 22px;margin-bottom:20px}
.fld{display:flex;flex-direction:column;gap:4px}
.fld label{font-size:9.5px;font-weight:800;color:var(--ts);text-transform:uppercase;letter-spacing:.4px}
.fld input,.fld select{font-family:inherit;font-size:12.5px;font-weight:600;color:var(--tp);background:var(--bg3);border:1.5px solid var(--bdr);border-radius:7px;padding:7px 10px;width:100%}
.fld input.mono{font-family:"DM Mono",monospace;font-weight:500}
.fld input:focus,.fld select:focus{outline:none;border-color:var(--acc);background:var(--bg2)}
.servis-link{display:flex;align-items:center;gap:11px;padding:13px 15px;background:var(--bg3);border:1.5px dashed var(--bdr);border-radius:10px;margin-bottom:6px}
.servis-link .si{width:34px;height:34px;border-radius:8px;background:var(--bg2);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.servis-link .si svg{width:17px;height:17px;stroke:var(--acc);stroke-width:2;fill:none}
.servis-link .st{flex:1}.servis-link .st b{font-size:12.5px;font-weight:700}.servis-link .st div{font-size:11px;color:var(--ts);font-weight:500;margin-top:1px}
.card-ft{display:flex;align-items:center;gap:9px;padding:15px 22px;border-top:1.5px solid var(--bdr);background:var(--bg3)}
.card-ft .sp{flex:1}
@media (max-width:720px){.kpis{grid-template-columns:repeat(3,1fr)}.fgrid{grid-template-columns:1fr}}
</style>
</head>

const TODAY = new Date('2026-06-20T00:00:00');
const STATUSI = [['u prometu','U prometu','aktivno'],['odjavljeno','Odjavljeno','odjavljeno'],['rashod','Rashod','rashod']];
function statusMeta(s){ return STATUSI.find(x=>x[0]===s)||STATUSI[0]; }

function normVrsta(v){ v=(v||'').toUpperCase();
  if(v.includes('M2')) return 'Minibus';
  if(v.includes('N1')||v.includes('TERETNI')) return 'Teretno';
  if(v.includes('M1')||v.includes('OSOBNI')) return 'Osobno';
  if(v.includes('AUTOBUS')||v.includes('M3')||v.includes('MA')) return 'Autobus';
  return 'Ostalo'; }
function euroOf(m){ m=(m||'').toUpperCase(); const x=m.match(/EURO\s*-?\s*(VI|IV|III|II|V|I)\b/); return x?('EURO '+x[1]):'—'; }
function statusOf(r){ if(r.reg_istek==='odjava'){ return (r.god && r.god<2003)?'rashod':'odjavljeno'; } return 'u prometu'; }
function parseDate(s){ if(!s||s==='odjava') return null;
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return new Date(s+'T00:00:00');
  let m=s.match(/^(\d{2})\.(\d{2})\.(\d{4})$/); if(m) return new Date(+m[3],+m[2]-1,+m[1]); return null; }
function fmtDate(s){ const d=parseDate(s); if(!d) return '—'; return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear()+'.'; }
function daysTo(s){ const d=parseDate(s); if(!d) return null; return Math.round((d-TODAY)/86400000); }
function gbrNum(g){ const n=parseInt(g,10); return isNaN(n)?999999:n; }
const esc=s=>(s==null?'':(''+s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

let VOZILA = Object.keys(VEHICLES_RAW).map(function(gbr){
  const r=VEHICLES_RAW[gbr];
  return { gbr:gbr, _id:gbr, reg:r.reg||'', vrsta:r.vrsta||'', kat:normVrsta(r.vrsta),
    marka:(r.marka||'').toUpperCase(), tip:r.tip||'', model:r.model||'', sasija:r.sasija||'',
    god:r.god||null, prva_reg:r.prva_reg||null, reg_istek:r.reg_istek||null,
    sjedenje:r.sjedenje, stajanje:r.stajanje, masa:r.masa, snaga:r.snaga,
    motor:r.motor||'', euro:euroOf(r.motor), duzina:r.duzina, gume_p:r.gume_p||'', gume_z:r.gume_z||'',
    status:statusOf(r) };
});

let sortKey='gbr', sortDir=1, fStatus='', editId=null;

const COLS=[['gbr','GBR'],['reg','Registracija'],['kat','Vrsta'],['marka','Marka / model'],['god','God.'],['euro','Euro'],['mjesta','Mjesta'],['reg_istek','Istek reg.'],['status','Status']];

function render(){
  const q=(document.getElementById('q').value||'').toLowerCase().trim();
  const fkat=document.getElementById('fkat').value;
  let rows=VOZILA.filter(function(v){
    if(fStatus && v.status!==fStatus) return false;
    if(fkat && v.kat!==fkat) return false;
    if(q){ const hay=(v.gbr+' '+v.reg+' '+v.marka+' '+v.model+' '+v.tip+' '+v.sasija).toLowerCase(); if(!hay.includes(q)) return false; }
    return true;
  });
  rows.sort(function(a,b){
    let A,B;
    if(sortKey==='gbr'){A=gbrNum(a.gbr);B=gbrNum(b.gbr);}
    else if(sortKey==='god'){A=a.god||0;B=b.god||0;}
    else if(sortKey==='mjesta'){A=(a.sjedenje||0)+(a.stajanje||0);B=(b.sjedenje||0)+(b.stajanje||0);}
    else if(sortKey==='reg_istek'){A=parseDate(a.reg_istek)?parseDate(a.reg_istek).getTime():0;B=parseDate(b.reg_istek)?parseDate(b.reg_istek).getTime():0;}
    else {A=(a[sortKey]||'').toString().toLowerCase();B=(b[sortKey]||'').toString().toLowerCase();}
    return A<B?-1*sortDir:A>B?1*sortDir:0;
  });
  renderKpis();
  // thead
  document.getElementById('THEAD').innerHTML=COLS.map(function(c){
    const ar=sortKey===c[0]?'<span class="ar">'+(sortDir>0?'▲':'▼')+'</span>':'';
    return '<th onclick="setSort(\''+c[0]+'\')">'+c[1]+' '+ar+'</th>';
  }).join('');
  // body
  if(!rows.length){ document.getElementById('TBODY').innerHTML='<tr><td colspan="9" class="empty-tbl">Nema vozila za zadane filtere.</td></tr>'; return; }
  document.getElementById('TBODY').innerHTML=rows.map(function(v){
    const sm=statusMeta(v.status);
    const dd=daysTo(v.reg_istek);
    let dcl='none',dtx='—';
    if(v.reg_istek==='odjava'){ dcl='none'; dtx='—'; }
    else if(parseDate(v.reg_istek)){ dtx=fmtDate(v.reg_istek); dcl = dd<0?'over':(dd<=45?'soon':''); }
    const mj=((v.sjedenje||0)+'+'+(v.stajanje||0));
    return '<tr onclick="openCard(\''+v._id+'\')">'
      +'<td><span class="gbr">'+esc(v.gbr)+'</span></td>'
      +'<td><span class="reg">'+esc(v.reg||'—')+'</span></td>'
      +'<td>'+esc(v.kat)+'</td>'
      +'<td><span class="mk">'+esc(v.marka)+'</span> <span class="md">'+esc(v.model||v.tip||'')+'</span></td>'
      +'<td class="num">'+(v.god||'—')+'</td>'
      +'<td class="num"><span class="euro'+(v.euro==='EURO VI'?' e6':'')+'">'+v.euro+'</span></td>'
      +'<td class="num">'+mj+'</td>'
      +'<td class="num"><span class="dexp '+dcl+'">'+dtx+'</span></td>'
      +'<td><span class="pill '+sm[2]+'">'+sm[1]+'</span></td>'
      +'</tr>';
  }).join('');
}

function renderKpis(){
  const tot=VOZILA.length;
  const uprom=VOZILA.filter(v=>v.status==='u prometu').length;
  const odj=VOZILA.filter(v=>v.status==='odjavljeno').length;
  const rash=VOZILA.filter(v=>v.status==='rashod').length;
  const bus=VOZILA.filter(v=>v.kat==='Autobus'&&v.status==='u prometu').length;
  const e6=VOZILA.filter(v=>v.euro==='EURO VI'&&v.status==='u prometu').length;
  const isteku=VOZILA.filter(function(v){ const d=daysTo(v.reg_istek); return v.status==='u prometu' && d!=null && d>=0 && d<=45; }).length;
  const k=[[tot,'','Ukupno vozila'],[uprom,'g','U prometu'],[bus,'b','Autobusa u prometu'],[e6,'g','Euro VI'],[odj+rash,'','Odjavljeno / rashod'],[isteku,isteku?'y':'','Reg. ističe (45d)']];
  document.getElementById('KPIS').innerHTML=k.map(s=>'<div class="kpi"><div class="kpi-n">'+(s[1]?'<span class="d '+s[1]+'"></span>':'')+s[0]+'</div><div class="kpi-l">'+s[2]+'</div></div>').join('');
}

function renderFstat(){
  const counts={'':VOZILA.length};STATUSI.forEach(s=>counts[s[0]]=VOZILA.filter(v=>v.status===s[0]).length);
  let h='<button class="fchip'+(fStatus===''?' on':'')+'" onclick="setStatusFilter(\'\')">Svi · '+counts['']+'</button>';
  STATUSI.forEach(s=>{ h+='<button class="fchip'+(fStatus===s[0]?' on':'')+'" onclick="setStatusFilter(\''+s[0]+'\')">'+s[1]+' · '+counts[s[0]]+'</button>'; });
  document.getElementById('FSTAT').innerHTML=h;
}
function setStatusFilter(s){ fStatus=s; renderFstat(); render(); }
function setSort(k){ if(sortKey===k) sortDir*=-1; else { sortKey=k; sortDir=1; } render(); }

/* ─── Kartica vozila ─── */
function openCard(id){
  editId=id;
  const v = id ? VOZILA.find(x=>x._id===id) : { gbr:'', reg:'', vrsta:'', kat:'Autobus', marka:'', tip:'', model:'', sasija:'', god:'', prva_reg:'', reg_istek:'', sjedenje:'', stajanje:'', masa:'', snaga:'', motor:'', euro:'—', duzina:'', gume_p:'', gume_z:'', status:'u prometu' };
  const sm=statusMeta(v.status);
  const isNew=!id;
  function fi(label,key,mono,ph){ return '<div class="fld"><label>'+label+'</label><input class="'+(mono?'mono':'')+'" id="f_'+key+'" value="'+esc(v[key]==null?'':v[key])+'" placeholder="'+(ph||'')+'"></div>'; }
  let h='';
  h+='<div class="card-hd">'
   + '<span class="gbr">'+(isNew?'GBR':esc(v.gbr))+'</span>'
   + '<div class="card-hd-main">'
   +   '<div class="eyebrow" style="font-size:9.5px;font-weight:800;color:var(--ts);text-transform:uppercase;letter-spacing:.6px">'+(isNew?'Novo vozilo':'Kartica vozila')+'</div>'
   +   '<div class="card-hd-tit">'+(isNew?'Novo vozilo':esc(v.marka)+' '+esc(v.model||v.tip||''))+'<span class="pill '+sm[2]+'">'+sm[1]+'</span></div>'
   +   '<div class="card-hd-sub">'+esc(v.reg||'—')+' · '+esc(v.kat)+' · '+(v.god||'—')+'</div>'
   + '</div>'
   + '<button class="card-x" onclick="closeCard()"><svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg></button>'
   + '</div>';
  h+='<div class="card-bd">';
  h+='<div class="sect-t">Identifikacija</div><div class="fgrid">'
   + fi('Garažni broj (GBR)','gbr',true,'npr. 415')
   + fi('Registracija','reg',true,'ZD 000 AA')
   + fi('Marka','marka',false,'')
   + fi('Tip','tip',false,'')
   + fi('Model','model',false,'')
   + fi('Šasija (VIN)','sasija',true,'')
   + '<div class="fld"><label>Vrsta (homologacija)</label><input id="f_vrsta" value="'+esc(v.vrsta)+'" placeholder="M3 - AUTOBUS"></div>'
   + '<div class="fld"><label>Status</label><select id="f_status">'+STATUSI.map(s=>'<option value="'+s[0]+'"'+(v.status===s[0]?' selected':'')+'>'+s[1]+'</option>').join('')+'</select></div>'
   + fi('Godina proizvodnje','god',true,'')
   + fi('Prva registracija','prva_reg',true,'GGGG-MM-DD')
   + fi('Istek registracije','reg_istek',true,'GGGG-MM-DD / odjava')
   + '</div>';
  h+='<div class="sect-t">Tehnički podaci</div><div class="fgrid">'
   + fi('Motor / norma','motor',false,'DIESEL - EURO VI')
   + fi('Snaga (kW)','snaga',true,'')
   + fi('Masa (kg)','masa',true,'')
   + fi('Dužina (mm)','duzina',true,'')
   + fi('Sjedećih mjesta','sjedenje',true,'')
   + fi('Stajaćih mjesta','stajanje',true,'')
   + fi('Gume prednje','gume_p',true,'')
   + fi('Gume zadnje','gume_z',true,'')
   + '</div>';
  if(!isNew){
    h+='<div class="sect-t">Servis i stanje</div>'
     + '<div class="servis-link"><div class="si"><svg viewBox="0 0 24 24"><path d="M14.7 6.3a4 4 0 0 0-5 5L4 17v3h3l5.7-5.7a4 4 0 0 0 5-5l-2.8 2.8-2-2 2.8-2.8z"/></svg></div>'
     + '<div class="st"><b>TP, servis, kvarovi, km, tahograf</b><div>Servisni podaci se vode u modulu Tehnička služba.</div></div>'
     + '<button class="btn btn-ghost" onclick="otvoriServis(\''+esc(v.gbr)+'\')">Otvori u Servisu ↗</button></div>';
  }
  h+='</div>';
  h+='<div class="card-ft">'
   + (isNew?'':'<button class="btn btn-danger" onclick="deleteVoz(\''+v._id+'\')">Obriši</button>')
   + '<div class="sp"></div>'
   + '<button class="btn btn-ghost" onclick="closeCard()">Odustani</button>'
   + '<button class="btn btn-acc" onclick="saveVoz()">'+(isNew?'Kreiraj vozilo':'Spremi')+'</button>'
   + '</div>';
  document.getElementById('cardEl').innerHTML=h;
  document.getElementById('cardBg').classList.add('on');
}
function closeCard(){ document.getElementById('cardBg').classList.remove('on'); editId=null; }
function val(k){ const e=document.getElementById('f_'+k); return e?e.value.trim():''; }
function numOrNull(k){ const x=val(k); return x===''?null:(isNaN(+x)?x:+x); }
function saveVoz(){
  const gbr=val('gbr'); if(!gbr){ document.getElementById('f_gbr').focus(); return; }
  let v = editId ? VOZILA.find(x=>x._id===editId) : null;
  if(!v){ if(VOZILA.some(x=>x.gbr===gbr)){ alert('GBR '+gbr+' već postoji.'); return; } v={_id:'v'+Date.now()}; VOZILA.push(v); }
  v.gbr=gbr; v.reg=val('reg'); v.marka=val('marka').toUpperCase(); v.tip=val('tip'); v.model=val('model');
  v.sasija=val('sasija'); v.vrsta=val('vrsta'); v.kat=normVrsta(val('vrsta')); v.status=val('status');
  v.god=numOrNull('god'); v.prva_reg=val('prva_reg')||null; v.reg_istek=val('reg_istek')||null;
  v.motor=val('motor'); v.euro=euroOf(val('motor')); v.snaga=numOrNull('snaga'); v.masa=numOrNull('masa');
  v.duzina=numOrNull('duzina'); v.sjedenje=numOrNull('sjedenje'); v.stajanje=numOrNull('stajanje');
  v.gume_p=val('gume_p'); v.gume_z=val('gume_z');
  closeCard(); renderFstat(); render();
}
function deleteVoz(id){ const v=VOZILA.find(x=>x._id===id); if(!v) return;
  if(!confirm('Obrisati vozilo GBR '+v.gbr+' iz registra? Ovo je matični zapis.')) return;
  VOZILA=VOZILA.filter(x=>x._id!==id); closeCard(); renderFstat(); render(); }
function otvoriServis(gbr){ alert('Otvara Servis za GBR '+gbr+' (modul Tehnička služba).'); }

function toggleTheme(){ const html=document.documentElement; const dark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme',dark?'light':'dark');
  document.getElementById('themeIc').innerHTML = dark
    ? '<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>'
    : '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M6.3 17.7l-1.4 1.4M19.1 4.9l-1.4 1.4"/>'; }

document.getElementById('cardBg').addEventListener('click',function(e){ if(e.target===this) closeCard(); });
renderFstat(); render();
</script>
</body>
</html>
